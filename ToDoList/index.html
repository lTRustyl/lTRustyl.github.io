<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Судновий Журнал Капітана</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-light d-flex align-items-center min-vh-100 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <header class="text-center mb-4">
                    <h1 class="fw-bold text-warning">🏴‍☠️ СУДНОВИЙ ЖУРНАЛ</h1>
                    <p class="text-secondary small">Записуй свої грабунки та справи, доки тебе не зжерли акули!</p>
                </header>

                <main>
                    <div class="input-group mb-4">
                        <input type="text" id="taskInput" class="form-control bg-secondary text-white border-warning" placeholder="Який скарб шукаємо?">
                        <button id="addBtn" class="btn btn-warning fw-bold text-dark">ДОДАТИ В ПЛАН</button>
                    </div>

                    <fieldset class="border border-secondary rounded p-3 bg-black bg-opacity-25">
                        <legend class="float-none w-auto px-2 fs-6 text-warning fw-bold">СПИСОК НАГАЛЬНИХ СПРАВ</legend>
                        <div id="taskListContainer" class="list-group"></div>
                    </fieldset>
                </main>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
